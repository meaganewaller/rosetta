name: validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # The gate. Validates the catalog against the plugin spec. No dependencies to install —
  # the validator runs as native TypeScript on Node's type stripping.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Validate catalog
        run: node scripts/validate.ts

  # Type-checks the tooling and runs the adapter test suite (golden files + fidelity).
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: Coverage report is up to date
        run: |
          npm run coverage
          git diff --exit-code -- docs/coverage.md \
            || { echo "::error::docs/coverage.md is stale — run 'mise run coverage' and commit."; exit 1; }
